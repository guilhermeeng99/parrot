name: Release

# On every push to main: run CI (svelte-check + vitest + sidecar pytest + Rust
# clippy/test) and ONLY if it passes, bump the patch version, tag, build the
# Windows MSI (sidecar source + uv.exe bundled), sign the updater artifacts, and
# publish a GitHub Release. PRs run CI only. The release job skips the bot's own
# `chore(release):` bump commit (which also carries `[skip ci]`).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: ci (check · test · clippy)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: astral-sh/setup-uv@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Frontend deps
        run: bun install
        working-directory: frontend

      - name: Svelte typecheck (svelte-check)
        run: bun run check
        working-directory: frontend

      - name: Frontend unit tests (vitest)
        run: bun run test
        working-directory: frontend

      - name: Frontend production build
        run: bun run build
        working-directory: frontend

      - name: Frontend audit
        run: bun audit
        working-directory: frontend

      - name: Install Playwright Chromium
        run: bunx playwright install chromium
        working-directory: frontend

      - name: Frontend E2E smoke (Playwright)
        run: bun run test:e2e
        working-directory: frontend

      - name: Enable Corepack
        run: corepack enable

      - name: Site deps
        run: pnpm install --frozen-lockfile
        working-directory: site

      - name: Site build
        run: pnpm run build
        working-directory: site

      - name: Site audit
        run: pnpm audit
        working-directory: site

      # Model boundary is mocked, so the heavy `engine`/torch extras are NOT synced
      # here — the light dev venv is enough for the router/service suite.
      - name: Sidecar tests (pytest)
        run: |
          uv sync --frozen
          uv run pytest -q
        working-directory: sidecar

      - name: Sidecar audit
        run: uv run pip-audit
        working-directory: sidecar

      # tauri-build checks externalBin existence at COMPILE time, so clippy + cargo
      # test need uv.exe present, not just the bundle step.
      - name: Fetch uv (externalBin)
        uses: ./.github/actions/fetch-uv-bin

      # The Rust shell gates the release: `release` needs `ci`, so a warning or a
      # red test blocks publishing. Zero-warning rule is enforced with -D warnings.
      - name: Clippy (warnings = errors)
        run: cargo clippy --all-targets -- -D warnings
        working-directory: frontend/src-tauri

      - name: Cargo test (sidecar supervisor)
        run: cargo test
        working-directory: frontend/src-tauri

      - name: App smoke test
        shell: bash
        run: bash scripts/smoke-test.sh

  release:
    name: bump · build · publish
    runs-on: windows-latest
    needs: [ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(release):')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: astral-sh/setup-uv@v5

      - name: Bump patch version (tauri.conf.json + Cargo.toml + package.json + sidecar/pyproject.toml + uv.lock)
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          current=$(jq -r .version frontend/src-tauri/tauri.conf.json)
          IFS=. read -r major minor patch <<< "$current"
          next="${major}.${minor}.$((patch + 1))"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          tmp=$(mktemp)
          jq --arg v "$next" '.version = $v' frontend/src-tauri/tauri.conf.json > "$tmp"
          mv "$tmp" frontend/src-tauri/tauri.conf.json
          sed -i -E "0,/^version = \".*\"$/ s//version = \"$next\"/" frontend/src-tauri/Cargo.toml
          # Keep the 4th manifest in lockstep (packaging.md): the sidecar's own
          # version. First `^version = "…"` line in pyproject is [project].version.
          sed -i -E "0,/^version = \".*\"$/ s//version = \"$next\"/" sidecar/pyproject.toml
          tmp=$(mktemp)
          jq --arg v "$next" '.version = $v' frontend/package.json > "$tmp"
          mv "$tmp" frontend/package.json
          ( cd sidecar && uv lock )
          echo "bumped $current -> $next"

      - name: Commit, tag, push
        shell: bash
        run: |
          set -euo pipefail
          next="${{ steps.bump.outputs.next }}"
          git add frontend/src-tauri/tauri.conf.json frontend/src-tauri/Cargo.toml frontend/package.json sidecar/pyproject.toml sidecar/uv.lock
          git commit -m "chore(release): v${next} [skip ci]"
          git tag "v${next}"
          git push origin HEAD:main
          git push origin "v${next}"

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Frontend deps
        run: bun install
        working-directory: frontend

      # Tauri externalBin: the bundle ships uv.exe; the user's machine bootstraps the
      # Python venv on first run. Gitignored (~67MB), so fetch it before the build.
      - name: Fetch uv (externalBin)
        uses: ./.github/actions/fetch-uv-bin

      - name: Build & publish installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts + emits latest.json so the in-app updater can
          # verify updates against the pubkey in tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName: v${{ steps.bump.outputs.next }}
          releaseName: 'Parrot v${{ steps.bump.outputs.next }}'
          releaseBody: |
            Auto-released from `main` @ ${{ github.sha }}.

            Download the installer for Windows x64 — the **`.exe`** (NSIS, `Parrot_${{ steps.bump.outputs.next }}_x64-setup.exe`) or the **`.msi`** — and run it. The Python voice engine is bootstrapped on first launch — nothing else to install.

            > **First install:** Parrot is unsigned (no Authenticode cert), so Windows SmartScreen may warn "Unrecognized app". Click **More info → Run anyway**.
            > **First run:** the one-time model download + runtime setup take a few minutes and need internet. After that, Parrot is fully local — no accounts, no cloud.
          releaseDraft: false
          prerelease: false
