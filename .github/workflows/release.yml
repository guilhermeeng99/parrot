name: Release

# On every push to main: run CI (svelte-check + vitest + sidecar pytest + Rust
# clippy/test) and ONLY if it passes, bump the patch version, tag, build the
# Windows MSI (sidecar source + uv.exe bundled), sign the updater artifacts, and
# publish a GitHub Release. PRs run CI only. The release job skips the bot's own
# `chore(release):` bump commit (which also carries `[skip ci]`).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: ci (check · test · clippy)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: astral-sh/setup-uv@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Frontend deps
        run: bun install
        working-directory: frontend

      - name: Svelte typecheck (svelte-check)
        run: bun run check
        working-directory: frontend

      - name: Frontend unit tests (vitest)
        run: bun run test
        working-directory: frontend

      # Model boundary is mocked, so the heavy `engine`/torch extras are NOT synced
      # here — the light dev venv is enough for the router/service suite.
      - name: Sidecar tests (pytest)
        run: |
          uv sync
          uv run pytest -q
        working-directory: sidecar

      # The Rust shell gates the release: `release` needs `ci`, so a warning or a
      # red test blocks publishing. Zero-warning rule is enforced with -D warnings.
      - name: Clippy (warnings = errors)
        run: cargo clippy --all-targets -- -D warnings
        working-directory: frontend/src-tauri

      - name: Cargo test (sidecar supervisor)
        run: cargo test
        working-directory: frontend/src-tauri

  release:
    name: bump · build · publish
    runs-on: windows-latest
    needs: [ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(release):')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version (tauri.conf.json + Cargo.toml + package.json)
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          current=$(jq -r .version frontend/src-tauri/tauri.conf.json)
          IFS=. read -r major minor patch <<< "$current"
          next="${major}.${minor}.$((patch + 1))"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          tmp=$(mktemp)
          jq --arg v "$next" '.version = $v' frontend/src-tauri/tauri.conf.json > "$tmp"
          mv "$tmp" frontend/src-tauri/tauri.conf.json
          sed -i -E "0,/^version = \".*\"$/ s//version = \"$next\"/" frontend/src-tauri/Cargo.toml
          tmp=$(mktemp)
          jq --arg v "$next" '.version = $v' frontend/package.json > "$tmp"
          mv "$tmp" frontend/package.json
          echo "bumped $current -> $next"

      - name: Commit, tag, push
        shell: bash
        run: |
          set -euo pipefail
          next="${{ steps.bump.outputs.next }}"
          git add frontend/src-tauri/tauri.conf.json frontend/src-tauri/Cargo.toml frontend/package.json
          git commit -m "chore(release): v${next} [skip ci]"
          git tag "v${next}"
          git push origin HEAD:main
          git push origin "v${next}"

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Frontend deps
        run: bun install
        working-directory: frontend

      # Tauri externalBin: the bundle ships uv.exe; the user's machine bootstraps the
      # Python venv on first run. It's gitignored (~67MB), so fetch it here and place
      # it under the target-triple name the bundler resolves `binaries/uv` to.
      - name: Fetch uv (externalBin)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path frontend/src-tauri/binaries | Out-Null
          $zip = "$env:RUNNER_TEMP\uv.zip"
          Invoke-WebRequest -Uri "https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-pc-windows-msvc.zip" -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP\uv" -Force
          Copy-Item "$env:RUNNER_TEMP\uv\uv.exe" "frontend/src-tauri/binaries/uv-x86_64-pc-windows-msvc.exe" -Force

      - name: Build & publish installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts + emits latest.json so the in-app updater can
          # verify updates against the pubkey in tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName: v${{ steps.bump.outputs.next }}
          releaseName: 'Parrot v${{ steps.bump.outputs.next }}'
          releaseBody: |
            Auto-released from `main` @ ${{ github.sha }}.

            Download **`Parrot_${{ steps.bump.outputs.next }}_x64_en-US.msi`** below and run it. The Python voice engine is bootstrapped on first launch — nothing else to install.

            > **First install:** Parrot is unsigned (no Authenticode cert), so Windows SmartScreen may warn "Unrecognized app". Click **More info → Run anyway**.
            > **First run:** the one-time model download + runtime setup take a few minutes and need internet. After that, Parrot is fully local — no accounts, no cloud.
          releaseDraft: false
          prerelease: false
