# Alembic config for Parrot's SQLite DB.
#
# The runtime app creates the schema idempotently (app.core.db.init_db); alembic
# is the versioned, tested upgrade path that keeps an existing parrot_data/ DB
# current with no manual migration (CLAUDE.md). `sqlalchemy.url` is normally
# resolved at runtime in env.py from app.core.paths.db_path(); override it via
# `-x db_url=...` or by setting the value here for ad-hoc runs.

[alembic]
script_location = alembic
prepend_sys_path = .
# Left blank: env.py fills this from PARROT_DATA_DIR / app.core.paths at runtime.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
