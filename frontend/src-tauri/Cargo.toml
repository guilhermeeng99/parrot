[package]
name = "parrot"
version = "0.0.1"
description = "Parrot — clone a voice, make it speak"
authors = ["Guilherme Passos"]
edition = "2021"

[lib]
name = "parrot_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Tiny blocking HTTP client for the loopback /healthz probe (no TLS needed).
ureq = { version = "2", default-features = false }
